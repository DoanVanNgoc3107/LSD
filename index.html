        function App() {
            const [questions, setQuestions] = useState(initialQuestions);
            const [currentMode, setCurrentMode] = useState('menu');

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 font-sans selection:bg-blue-500 selection:text-white">
                    {/* Header */}
                    <header className="p-4 bg-slate-800 shadow-md flex justify-between items-center border-b border-slate-700">
                        <h1 className="text-xl md:text-2xl font-bold bg-gradient-to-r from-blue-400 to-teal-400 bg-clip-text text-transparent cursor-pointer" onClick={() => setCurrentMode('menu')}>
                            Lịch sử Đảng Cộng Sản Việt Nam
                        </h1>
                        <div className="text-sm text-slate-400 hidden md:block">
                            Auth: <span className="text-blue-400 font-semibold">Đoàn Văn Ngọc</span>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="container mx-auto p-4 md:p-8 flex justify-center items-center min-h-[calc(100vh-80px)]">
                        {currentMode === 'menu' && <MainMenu setMode={setCurrentMode} totalQuestions={questions.length} />}
                        {currentMode === 'flashcard' && <FlashcardMode questions={questions} goBack={() => setCurrentMode('menu')} />}
                        {currentMode === 'survival' && <SurvivalMode questions={questions} goBack={() => setCurrentMode('menu')} />}
                        {currentMode === 'matching' && <MatchingMode questions={questions} goBack={() => setCurrentMode('menu')} />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // 1. MENU CHÍNH
        // ==========================================
        function MainMenu({ setMode, totalQuestions }) {
            return (
                <div className="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center transform transition-all hover:scale-[1.01]">

                    <p className="text-slate-400 mb-8">Hệ thống đang có sẵn <span className="text-teal-400 font-bold">{totalQuestions}</span> câu hỏi. Chọn một chế độ để bắt đầu.</p>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <button onClick={() => setMode('flashcard')} className="flex flex-col items-center p-6 bg-slate-700 rounded-xl hover:bg-blue-600 transition-colors group">
                            <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">🃏</div>
                            <h3 className="font-bold text-lg mb-2">Lật Thẻ (Ghi Nhớ)</h3>
                            <p className="text-sm text-slate-300">Nhìn lướt câu và tự đưa ra đáp án.</p>
                        </button>

                        <button onClick={() => setMode('survival')} className="flex flex-col items-center p-6 bg-slate-700 rounded-xl hover:bg-red-600 transition-colors group">
                            <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">⏱️</div>
                            <h3 className="font-bold text-lg mb-2">Sinh Tồn (Phản Xạ)</h3>
                            <p className="text-sm text-slate-300">Trả lời trắc nghiệm có bấm giờ</p>
                        </button>

                        <button onClick={() => setMode('matching')} className="flex flex-col items-center p-6 bg-slate-700 rounded-xl hover:bg-teal-600 transition-colors group">
                            <div className="text-5xl mb-4 group-hover:scale-110 transition-transform">🧩</div>
                            <h3 className="font-bold text-lg mb-2">Ghép Cặp</h3>
                            <p className="text-sm text-slate-300">Nối câu hỏi với đáp án tương ứng giữa một ma trận hỗn loạn.</p>
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 2. CHẾ ĐỘ LẬT THẺ (FLASHCARD)
        // ==========================================
        function FlashcardMode({ questions, goBack }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const handleNext = () => {
                setIsFlipped(false);
                setCurrentIndex((prev) => (prev + 1) % questions.length);
            };

            const handlePrev = () => {
                setIsFlipped(false);
                setCurrentIndex((prev) => (prev - 1 + questions.length) % questions.length);
            };

            const q = questions[currentIndex];

            return (
                <div className="w-full max-w-xl flex flex-col items-center">
                    <div className="w-full flex justify-between items-center mb-6">
                        <button onClick={goBack} className="text-slate-400 hover:text-white flex items-center gap-2">
                            <span>&larr;</span> Quay lại
                        </button>
                        <span className="text-slate-400">Thẻ {currentIndex + 1} / {questions.length}</span>
                    </div>

                    <div
                        className="w-full aspect-[4/3] perspective-1000 cursor-pointer"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                            <div className="absolute w-full h-full bg-slate-800 border-2 border-blue-500/30 rounded-2xl flex flex-col justify-center items-center p-8 backface-hidden shadow-xl">
                                <span className="text-sm text-blue-400 uppercase tracking-widest mb-4 font-bold">Câu hỏi</span>
                                <p className="text-xl md:text-2xl text-center leading-relaxed">{q.question}</p>
                                <p className="absolute bottom-6 text-slate-500 text-sm animate-pulse">Chạm để xem đáp án</p>
                            </div>

                            <div className="absolute w-full h-full bg-teal-900 border-2 border-teal-500/50 rounded-2xl flex flex-col justify-center items-center p-8 backface-hidden shadow-xl rotate-y-180 text-center">
                                <span className="text-sm text-teal-400 uppercase tracking-widest mb-4 font-bold">Đáp án đúng</span>
                                <p className="text-2xl md:text-3xl font-bold text-white">{q.options[q.correctIndex]}</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-4 mt-8">
                        <button onClick={handlePrev} className="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-full font-bold transition-colors">
                            &larr; Cũ hơn
                        </button>
                        <button onClick={handleNext} className="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-full font-bold shadow-[0_0_15px_rgba(37,99,235,0.5)] transition-all">
                            Tiếp theo &rarr;
                        </button>
                    </div>

                    <style dangerouslySetInnerHTML={{
                        __html: `
                .perspective-1000 { perspective: 1000px; }
                .transform-style-3d { transform-style: preserve-3d; }
                .backface-hidden { backface-visibility: hidden; }
                .rotate-y-180 { transform: rotateY(180deg); }
              `}} />
                </div>
            );
        }

        // ==========================================
        // 3. CHẾ ĐỘ SINH TỒN (SURVIVAL QUIZ)
        // ==========================================
        function SurvivalMode({ questions, goBack }) {
            const [queue, setQueue] = useState([]);
            const [currentQ, setCurrentQ] = useState(null);
            const [lives, setLives] = useState(3);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(15);
            const [gameOver, setGameOver] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            useEffect(() => {
                startNewGame();
            }, [questions]);

            const startNewGame = () => {
                let shuffled = [...questions].sort(() => Math.random() - 0.5);
                setQueue(shuffled);
                setLives(3);
                setScore(0);
                setGameOver(false);
                loadNextQuestion(shuffled);
            };

            const loadNextQuestion = (currentQueue) => {
                if (currentQueue.length === 0) {
                    setGameOver(true);
                    return;
                }

                const q = currentQueue[0];
                const optionsWithOrigIndex = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctIndex }));
                const shuffledOptions = optionsWithOrigIndex.sort(() => Math.random() - 0.5);

                setCurrentQ({ ...q, displayOptions: shuffledOptions });
                setQueue(currentQueue.slice(1));
                setTimeLeft(15);
                setSelectedAnswer(null);
            };

            useEffect(() => {
                if (gameOver || !currentQ || selectedAnswer !== null) return;
                const timer = setInterval(() => {
                    setTimeLeft((prev) => {
                        if (prev <= 1) {
                            handleWrongAnswer();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [currentQ, gameOver, selectedAnswer]);

            const handleWrongAnswer = () => {
                setLives(l => l - 1);
                if (lives - 1 <= 0) {
                    setGameOver(true);
                } else {
                    setTimeout(() => loadNextQuestion(queue), 1500);
                }
            };

            const handleSelect = (idx, isCorrect) => {
                if (selectedAnswer !== null) return;
                setSelectedAnswer(idx);

                if (isCorrect) {
                    setScore(s => s + 100 + (timeLeft * 10));
                    setTimeout(() => loadNextQuestion(queue), 1000);
                } else {
                    handleWrongAnswer();
                }
            };

            if (gameOver) {
                return (
                    <div className="bg-slate-800 p-8 rounded-2xl text-center max-w-md w-full">
                        <h2 className="text-4xl mb-4">{lives <= 0 ? 'THUA CUỘC' : 'HOÀN THÀNH'}</h2>
                        <p className="text-xl mb-6">Điểm của bạn: <span className="text-teal-400 font-bold text-3xl">{score}</span></p>
                        <div className="flex gap-4 justify-center">
                            <button onClick={goBack} className="px-6 py-2 bg-slate-600 rounded-lg hover:bg-slate-500">Về Menu</button>
                            <button onClick={startNewGame} className="px-6 py-2 bg-blue-600 rounded-lg hover:bg-blue-500 font-bold">Chơi Lại</button>
                        </div>
                    </div>
                );
            }

            if (!currentQ) return <div>Loading...</div>;

            return (
                <div className="w-full max-w-2xl">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={goBack} className="text-slate-400 hover:text-white">&larr; Rời khỏi</button>
                        <div className="flex gap-6">
                            <div className="text-red-500 font-bold text-xl">
                                {Array(lives).fill('❤️').join('')}{Array(3 - lives).fill('🖤').join('')}
                            </div>
                            <div className="text-blue-400 font-bold text-xl font-mono">Điểm: {score}</div>
                        </div>
                    </div>

                    <div className="w-full bg-slate-700 h-3 rounded-full overflow-hidden mb-8">
                        <div
                            className={`h-full transition-all duration-1000 linear ${timeLeft <= 5 ? 'bg-red-500' : 'bg-teal-500'}`}
                            style={{ width: `${(timeLeft / 15) * 100}%` }}
                        ></div>
                    </div>

                    <div className="bg-slate-800 p-6 rounded-2xl mb-6 shadow-lg border border-slate-700">
                        <h2 className="text-2xl font-semibold leading-relaxed">{currentQ.question}</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {currentQ.displayOptions.map((opt, idx) => {
                            let btnClass = "bg-slate-700 hover:bg-slate-600 border-slate-600";
                            if (selectedAnswer !== null) {
                                if (opt.isCorrect) btnClass = "bg-teal-600 border-teal-500";
                                else if (selectedAnswer === idx && !opt.isCorrect) btnClass = "bg-red-600 border-red-500";
                                else btnClass = "bg-slate-800 border-slate-800 opacity-50";
                            }

                            return (
                                <button
                                    key={idx}
                                    onClick={() => handleSelect(idx, opt.isCorrect)}
                                    className={`p-4 rounded-xl border-2 text-left transition-all duration-200 ${btnClass}`}
                                >
                                    {opt.text}
                                </button>
                            )
                        })}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. CHẾ ĐỘ GHÉP CẶP (MATCHING)
        // ==========================================
        function MatchingMode({ questions, goBack }) {
            const [items, setItems] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [matchedIds, setMatchedIds] = useState([]);
            const [isFinished, setIsFinished] = useState(false);
            const [startTime, setStartTime] = useState(Date.now());
            const [timeTaken, setTimeTaken] = useState(0);

            useEffect(() => {
                startNewGame();
            }, [questions]);

            const startNewGame = () => {
                const selectedQs = [...questions].sort(() => 0.5 - Math.random()).slice(0, 6);

                let tempItems = [];
                selectedQs.forEach(q => {
                    tempItems.push({ id: `q_${q.id}`, pairId: q.id, type: 'question', text: q.question });
                    tempItems.push({ id: `a_${q.id}`, pairId: q.id, type: 'answer', text: q.options[q.correctIndex] });
                });

                setItems(tempItems.sort(() => 0.5 - Math.random()));
                setMatchedIds([]);
                setSelectedId(null);
                setIsFinished(false);
                setStartTime(Date.now());
            };

            const handleItemClick = (item) => {
                if (matchedIds.includes(item.pairId)) return;

                if (!selectedId) {
                    setSelectedId(item.id);
                } else {
                    if (selectedId === item.id) {
                        setSelectedId(null);
                        return;
                    }

                    const prevSelected = items.find(i => i.id === selectedId);

                    if (prevSelected.pairId === item.pairId && prevSelected.type !== item.type) {
                        const newMatched = [...matchedIds, item.pairId];
                        setMatchedIds(newMatched);
                        setSelectedId(null);

                        if (newMatched.length === items.length / 2) {
                            setTimeTaken(((Date.now() - startTime) / 1000).toFixed(1));
                            setIsFinished(true);
                        }
                    } else {
                        setSelectedId(null);
                    }
                }
            };

            if (isFinished) {
                return (
                    <div className="bg-slate-800 p-8 rounded-2xl text-center max-w-md w-full">
                        <h2 className="text-4xl mb-4">🎉 HOÀN THÀNH</h2>
                        <p className="text-xl mb-6">Bạn đã dọn dẹp ma trận trong: <span className="text-teal-400 font-bold text-3xl">{timeTaken}s</span></p>
                        <div className="flex gap-4 justify-center">
                            <button onClick={goBack} className="px-6 py-2 bg-slate-600 rounded-lg hover:bg-slate-500">Về Menu</button>
                            <button onClick={startNewGame} className="px-6 py-2 bg-teal-600 rounded-lg hover:bg-teal-500 font-bold">Chơi Lại</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full max-w-5xl">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={goBack} className="text-slate-400 hover:text-white">&larr; Rời khỏi</button>
                        <div className="text-slate-400">Tìm các cặp tương ứng để dọn sạch bảng!</div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {items.map(item => {
                            const isMatched = matchedIds.includes(item.pairId);
                            const isSelected = selectedId === item.id;

                            if (isMatched) {
                                return <div key={item.id} className="opacity-0 pointer-events-none transition-opacity duration-500"></div>;
                            }

                            let baseClass = "p-4 min-h-[120px] rounded-xl cursor-pointer flex items-center justify-center text-center text-sm md:text-base font-medium transition-all duration-200 border-2 shadow-md ";

                            if (isSelected) {
                                baseClass += "bg-blue-600 border-blue-400 scale-105 shadow-[0_0_15px_rgba(59,130,246,0.5)]";
                            } else {
                                baseClass += item.type === 'question'
                                    ? "bg-slate-800 border-slate-600 hover:border-blue-400"
                                    : "bg-slate-700 border-slate-500 hover:border-teal-400 text-teal-100";
                            }

                            return (
                                <div
                                    key={item.id}
                                    onClick={() => handleItemClick(item)}
                                    className={baseClass}
                                >
                                    {item.text}
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        }

        // Render ứng dụng ra giao diện
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
