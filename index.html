<!DOCTYPE html>

<head>

    <title>BrainBooster - Lịch sử Đảng</title>

    <!-- Lấy Font chữ hiện đại từ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tải Tailwind CSS và cấu hình Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    animation: {
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'pop': 'pop 0.3s ease-out forwards',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        pop: {
                            '0%': { transform: 'scale(0.95)', opacity: '0.5' },
                            '50%': { transform: 'scale(1.02)' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Tùy chỉnh thanh cuộn cho đẹp */

        }

            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* Hiệu ứng nền 3D dạng lưới */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }
    </style>

                            <div className="w-16 h-16 rounded-2xl bg-indigo-500/20 text-indigo-400 flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform duration-300">🃏</div>
                            <h3 className="font-bold text-xl text-white mb-3">Lật Thẻ</h3>
                            <p className="text-sm text-slate-400 leading-relaxed text-center">Ghi nhớ thụ động. Lướt qua câu hỏi và đáp án đúng để não bộ làm quen với dữ liệu.</p>
                        </button>

                        {/* Survival Card */}
                        <button onClick={() => setMode('survival')} className="group relative flex flex-col items-center p-8 bg-slate-800/40 backdrop-blur-md rounded-3xl border border-slate-700/50 hover:border-rose-500/50 hover:bg-slate-800/80 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(244,63,94,0.2)] active:scale-95 text-left">
                            <div className="absolute inset-0 bg-gradient-to-br from-rose-500/5 to-transparent rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div className="w-16 h-16 rounded-2xl bg-rose-500/20 text-rose-400 flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform duration-300">⏱️</div>
                            <h3 className="font-bold text-xl text-white mb-3">Thực chiến</h3>
                            <p className="text-sm text-slate-400 leading-relaxed text-center">Rèn luyện phản xạ dưới áp lực thời gian. Cẩn thận, bạn chỉ có 3 lần được phép sai số!</p>
                        </button>

                        {/* Matching Card */}
                        <button onClick={() => setMode('matching')} className="group relative flex flex-col items-center p-8 bg-slate-800/40 backdrop-blur-md rounded-3xl border border-slate-700/50 hover:border-emerald-500/50 hover:bg-slate-800/80 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_rgba(16,185,129,0.2)] active:scale-95 text-left">
                            <div className="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div className="w-16 h-16 rounded-2xl bg-emerald-500/20 text-emerald-400 flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform duration-300">🧩</div>
                            <h3 className="font-bold text-xl text-white mb-3">Ghép Cặp (Phân Tích)</h3>
                            <p className="text-sm text-slate-400 leading-relaxed text-center">Chống nhầm lẫn. Nối câu hỏi và đáp án giữa một ma trận thông tin nhiễu.</p>
                        </button>
                    </div>
                </div>
            );
        }

        function FlashcardMode({ questions, goBack }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const handleNext = () => {
                setIsFlipped(false);
                setCurrentIndex((prev) => (prev + 1) % questions.length);
            };

            const handlePrev = () => {
                setIsFlipped(false);
                setCurrentIndex((prev) => (prev - 1 + questions.length) % questions.length);
            };

            const q = questions[currentIndex];
            const progress = ((currentIndex + 1) / questions.length) * 100;

            return (
                <div className="w-full max-w-2xl flex flex-col items-center animate-pop">
                    {/* Header Actions & Progress */}
                    <div className="w-full flex justify-between items-center mb-4">
                        <button onClick={goBack} className="px-4 py-2 rounded-xl bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors flex items-center gap-2 text-sm font-semibold active:scale-95">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            Trở lại
                        </button>
                        <div className="text-sm font-semibold text-slate-400 bg-slate-800 px-4 py-2 rounded-xl">
                            {currentIndex + 1} <span className="text-slate-600">/</span> {questions.length}
                        </div>
                    </div>

                    <div className="w-full h-1.5 bg-slate-800 rounded-full mb-8 overflow-hidden">
                        <div className="h-full bg-indigo-500 rounded-full transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
                    </div>

                    {/* 3D Card Area */}
                    <div
                        className="w-full aspect-[4/3] md:aspect-[16/9] perspective-1000 cursor-pointer group"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`relative w-full h-full transition-transform duration-700 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>

                            {/* Front: Question */}
                            <div className="absolute w-full h-full bg-slate-800/80 backdrop-blur-xl border border-slate-600 rounded-3xl flex flex-col justify-center items-center p-8 md:p-12 backface-hidden shadow-[0_20px_40px_-15px_rgba(0,0,0,0.5)] group-hover:border-indigo-500/50 transition-colors">
                                <div className="absolute top-6 left-6 text-indigo-400 opacity-20 text-6xl font-serif">"</div>
                                <p className="text-xl md:text-2xl lg:text-3xl font-medium text-center leading-relaxed text-slate-100 z-10">{q.question}</p>
                                <div className="absolute bottom-6 flex items-center gap-2 text-slate-500 text-sm font-medium animate-pulse">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                                    Chạm để lật
                                </div>
                            </div>

                            {/* Back: Answer */}
                            <div className="absolute w-full h-full bg-gradient-to-br from-emerald-900/80 to-slate-900/80 backdrop-blur-xl border border-emerald-500/30 rounded-3xl flex flex-col justify-center items-center p-8 md:p-12 backface-hidden shadow-[0_20px_40px_-15px_rgba(16,185,129,0.2)] rotate-y-180 text-center">
                                <div className="w-12 h-12 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 mb-6">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <p className="text-2xl md:text-3xl lg:text-4xl font-bold text-emerald-50 drop-shadow-md leading-tight">{q.options[q.correctIndex]}</p>
                            </div>

                        </div>
                    </div>

                    {/* Navigation Controls */}
                    <div className="flex gap-4 mt-8 w-full justify-center">
                        <button onClick={handlePrev} className="px-6 md:px-8 py-3.5 md:py-4 bg-slate-800/80 hover:bg-slate-700 text-slate-300 rounded-2xl font-bold transition-all active:scale-95 border border-slate-700 w-1/3">
                            Cũ hơn
                        </button>
                        <button onClick={handleNext} className="px-6 md:px-8 py-3.5 md:py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold shadow-[0_0_20px_rgba(79,70,229,0.3)] transition-all active:scale-95 border border-indigo-500 w-2/3 flex justify-center items-center gap-2">
                            Tiếp theo
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>

                    <style dangerouslySetInnerHTML={{
                        __html: `
                .perspective-1000 { perspective: 1000px; }
                .transform-style-3d { transform-style: preserve-3d; }
                .backface-hidden { backface-visibility: hidden; }
                .rotate-y-180 { transform: rotateY(180deg); }
              `}} />
                </div>
            );
        }

        function SurvivalMode({ questions, goBack }) {
            const MAX_TIME_SECONDS = 30;
            const MAX_TIME_MS = MAX_TIME_SECONDS * 1000;

            const [queue, setQueue] = useState([]);
            const [currentQ, setCurrentQ] = useState(null);
            const [lives, setLives] = useState(3);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(MAX_TIME_MS);
            const [gameOver, setGameOver] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            useEffect(() => {
                startNewGame();
            }, [questions]);

            const startNewGame = () => {
                let shuffled = [...questions].sort(() => Math.random() - 0.5);
                setQueue(shuffled);
                setLives(3);
                setScore(0);
                setGameOver(false);
                loadNextQuestion(shuffled);
            };

            const loadNextQuestion = (currentQueue) => {
                if (currentQueue.length === 0) {
                    setGameOver(true);
                    return;
                }
                const q = currentQueue[0];
                const optionsWithOrigIndex = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctIndex }));
                const shuffledOptions = optionsWithOrigIndex.sort(() => Math.random() - 0.5);

                setCurrentQ({ ...q, displayOptions: shuffledOptions });
                setQueue(currentQueue.slice(1));
                setTimeLeft(MAX_TIME_MS);
                setSelectedAnswer(null);
            };

            // Smooth Timer Loop
            useEffect(() => {
                if (gameOver || !currentQ || selectedAnswer !== null) return;
                const timer = setInterval(() => {
                    setTimeLeft((prev) => {
                        if (prev <= 50) {
                            handleWrongAnswer();
                            return 0;
                        }
                        return prev - 50;
                    });
                }, 50);
                return () => clearInterval(timer);
            }, [currentQ, gameOver, selectedAnswer]);

            const handleWrongAnswer = () => {
                setLives(l => l - 1);
                if (lives - 1 <= 0) {
                    setGameOver(true);
                } else {
                    setTimeout(() => loadNextQuestion(queue), 1500);
                }
            };

            const handleSelect = (idx, isCorrect) => {
                if (selectedAnswer !== null) return;
                setSelectedAnswer(idx);

                if (isCorrect) {
                    const secondsLeft = Math.ceil(timeLeft / 1000);
                    setScore(s => s + 100 + (secondsLeft * 10));
                    setTimeout(() => loadNextQuestion(queue), 1000);
                } else {
                    handleWrongAnswer();
                }
            };

            if (gameOver) {
                return (
                    <div className="bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-10 rounded-3xl text-center max-w-md w-full shadow-2xl animate-pop">
                        <div className="text-6xl mb-6">{lives <= 0 ? '💥' : '🏆'}</div>
                        <h2 className="text-3xl font-black mb-2 text-white">{lives <= 0 ? 'HỆ THỐNG QUÁ TẢI' : 'HOÀN THÀNH NHIỆM VỤ'}</h2>
                        <p className="text-slate-400 mb-8">Điểm đánh giá năng lực:</p>
                        <div className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-8 font-mono">
                            {score}
                        </div>
                        <div className="flex gap-4 justify-center">
                            <button onClick={goBack} className="px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-semibold transition-all active:scale-95">Thoát</button>
                            <button onClick={startNewGame} className="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold shadow-[0_0_15px_rgba(16,185,129,0.4)] transition-all active:scale-95">Thử Lại Ngay</button>
                        </div>
                    </div>
                );
            }

            if (!currentQ) return null;

            const isWarning = timeLeft <= 5000;
            const timePercent = (timeLeft / MAX_TIME_MS) * 100;

            return (
                <div className="w-full max-w-3xl animate-pop flex flex-col">

                    {/* Game HUD (Heads-Up Display) */}
                    <div className="bg-slate-800/60 backdrop-blur-md border border-slate-700/50 rounded-2xl p-4 md:p-5 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center shadow-lg">
                        <button onClick={goBack} className="text-slate-400 hover:text-white transition-colors p-2 rounded-lg hover:bg-slate-700/50 hidden md:block">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        </button>

                        <div className="flex items-center gap-2">
                            {Array(3).fill(0).map((_, i) => (
                                <svg key={i} className={`w-8 h-8 ${i < lives ? 'text-rose-500 drop-shadow-[0_0_8px_rgba(244,63,94,0.6)]' : 'text-slate-700'}`} fill="currentColor" viewBox="0 0 20 20">
                                    <path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd"></path>
                                </svg>
                            ))}
                        </div>

                        <div className="flex items-center gap-6 w-full md:w-auto">
                            <div className="flex-1 md:w-48 text-right">
                                <div className={`text-3xl md:text-4xl font-black font-mono tracking-tighter ${isWarning ? 'text-rose-500 animate-pulse drop-shadow-[0_0_10px_rgba(244,63,94,0.5)]' : 'text-emerald-400'}`}>
                                    {(timeLeft / 1000).toFixed(1)}s
                                </div>
                            </div>
                            <div className="text-right border-l border-slate-600 pl-6">
                                <div className="text-xs text-slate-400 uppercase tracking-wider font-bold mb-1">Score</div>
                                <div className="text-2xl font-black font-mono text-white">{score}</div>
                            </div>
                        </div>
                    </div>

                    {/* Smooth Progress Bar */}
                    <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-6">
                        <div
                            className={`h-full transition-none rounded-full ${isWarning ? 'bg-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.8)]' : 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.5)]'}`}
                            style={{ width: `${timePercent}%` }}
                        ></div>
                    </div>

                    {/* Question Box */}
                    <div className="bg-slate-800/80 backdrop-blur-xl border border-slate-600 p-6 md:p-8 rounded-3xl mb-6 shadow-xl relative">
                        <div className="absolute top-0 left-8 w-16 h-1 bg-indigo-500 rounded-b-lg"></div>
                        <h2 className="text-xl md:text-2xl font-medium leading-relaxed text-white">{currentQ.question}</h2>
                    </div>

                    {/* Answer Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {currentQ.displayOptions.map((opt, idx) => {

                            // UX/UI Logic for Answer Buttons
                            let btnStateClass = "bg-slate-800/50 border-slate-600 hover:bg-slate-700 hover:border-indigo-400 text-slate-200 active:scale-[0.98]";
                            let icon = <span className="w-6 h-6 rounded-full border-2 border-slate-500 flex items-center justify-center text-xs text-slate-400 font-bold">{String.fromCharCode(65 + idx)}</span>;

                            if (selectedAnswer !== null) {
                                if (opt.isCorrect) {
                                    btnStateClass = "bg-emerald-900/40 border-emerald-500 text-emerald-100 shadow-[0_0_20px_rgba(16,185,129,0.2)] z-10 scale-[1.02] animate-pop";
                                    icon = <svg className="w-6 h-6 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd"></path></svg>;
                                } else if (selectedAnswer === idx && !opt.isCorrect) {
                                    btnStateClass = "bg-rose-900/40 border-rose-500 text-rose-100 animate-shake";
                                    icon = <svg className="w-6 h-6 text-rose-400" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd"></path></svg>;
                                } else {
                                    btnStateClass = "bg-slate-900/50 border-slate-800 opacity-40 pointer-events-none";
                                }
                            }

                            return (
                                <button
                                    key={idx}
                                    onClick={() => handleSelect(idx, opt.isCorrect)}
                                    disabled={selectedAnswer !== null}
                                    className={`relative flex items-start gap-4 p-5 md:p-6 rounded-2xl border-2 text-left transition-all duration-300 font-medium text-lg ${btnStateClass}`}
                                >
                                    <div className="shrink-0 mt-0.5">{icon}</div>
                                    <span className="leading-snug">{opt.text}</span>
                                </button>
                            )
                        })}
                    </div>
                </div>
            );
        }

        function MatchingMode({ questions, goBack }) {
            const [items, setItems] = useState([]);
            const [selectedTiles, setSelectedTiles] = useState([]);
            const [matchedIds, setMatchedIds] = useState([]);
            const [isWrong, setIsWrong] = useState(false);
            const [isFinished, setIsFinished] = useState(false);
            const [startTime, setStartTime] = useState(Date.now());
            const [timeTaken, setTimeTaken] = useState(0);
            const [moves, setMoves] = useState(0);

            // Thêm State để lưu danh sách các câu đã chơi
            const [playedIds, setPlayedIds] = useState([]);

            useEffect(() => {
                // Reset khi ngân hàng câu hỏi thay đổi, truyền 'true' để báo hiệu ván đầu tiên
                startNewGame(true);
            }, [questions]);

            const startNewGame = (isFreshStart = false) => {
                // Tránh việc event onClick của button truyền object vào làm isFreshStart = true
                const freshStart = isFreshStart === true;
                let currentPlayedIds = freshStart ? [] : playedIds;

                // Lọc ra những câu CHƯA chơi
                let pool = questions.filter(q => !currentPlayedIds.includes(q.id));

                // Nếu không đủ 4 câu để chơi (đã cày hết ngân hàng câu hỏi), reset lại vòng lặp
                if (pool.length < 4) {
                    pool = [...questions];
                    currentPlayedIds = [];
                }

                // Bốc ngẫu nhiên 4 câu từ pool chưa chơi
                const selectedQs = [...pool].sort(() => 0.5 - Math.random()).slice(0, 4);

                // Cập nhật lại danh sách đã chơi cho ván sau
                setPlayedIds([...currentPlayedIds, ...selectedQs.map(q => q.id)]);

                let tempItems = [];
                selectedQs.forEach(q => {
                    tempItems.push({ id: `q_${q.id}`, pairId: q.id, type: 'question', text: q.question });
                    tempItems.push({ id: `a_${q.id}`, pairId: q.id, type: 'answer', text: q.options[q.correctIndex] });
                });

                setItems(tempItems.sort(() => 0.5 - Math.random()));
                setMatchedIds([]);
                setSelectedTiles([]);
                setIsWrong(false);
                setIsFinished(false);
                setMoves(0);
                setStartTime(Date.now());
            };

            const handleItemClick = (item) => {
                if (matchedIds.includes(item.pairId) || selectedTiles.some(t => t.id === item.id) || isWrong || selectedTiles.length === 2) return;

                const newSelection = [...selectedTiles, item];
                setSelectedTiles(newSelection);

                if (newSelection.length === 2) {
                    setMoves(m => m + 1);
                    const [first, second] = newSelection;

                    if (first.pairId === second.pairId && first.type !== second.type) {
                        setTimeout(() => {
                            const newMatched = [...matchedIds, first.pairId];
                            setMatchedIds(newMatched);
                            setSelectedTiles([]);

                            if (newMatched.length === items.length / 2) {
                                setTimeTaken(((Date.now() - startTime) / 1000).toFixed(1));
                                setTimeout(() => setIsFinished(true), 400);
                            }
                        }, 400);
                    } else {
                        setIsWrong(true);
                        setTimeout(() => {
                            setIsWrong(false);
                            setSelectedTiles([]);
                        }, 700);
                    }
                }
            };

            if (isFinished) {
                return (
                    <div className="bg-slate-800/80 backdrop-blur-xl border border-slate-700 p-10 rounded-3xl text-center max-w-md w-full shadow-2xl animate-pop">
                        <div className="text-6xl mb-6">🧠</div>
                        <h2 className="text-3xl font-black mb-2 text-white">LIÊN KẾT THÀNH CÔNG</h2>

                        {/* Báo hiệu đã hoàn thành toàn bộ câu hỏi */}
                        {playedIds.length >= questions.length && (
                            <div className="text-emerald-400 font-bold mb-2 animate-pulse">🎉 BẠN ĐÃ HOÀN THÀNH 1 VÒNG 100 CÂU!</div>
                        )}

                        <div className="grid grid-cols-2 gap-4 my-8">
                            <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50">
                                <p className="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Thời gian</p>
                                <p className="text-3xl font-black text-emerald-400 font-mono">{timeTaken}s</p>
                            </div>
                            <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50">
                                <p className="text-slate-400 text-sm mb-1 uppercase tracking-wider font-semibold">Số lượt thử</p>
                                <p className="text-3xl font-black text-cyan-400 font-mono">{moves}</p>
                            </div>
                        </div>
                        <div className="flex gap-4 justify-center">
                            <button onClick={goBack} className="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold transition-all active:scale-95 text-white">Về Menu</button>
                            <button onClick={() => startNewGame(false)} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition-all active:scale-95 shadow-[0_0_15px_rgba(79,70,229,0.4)] text-white">Chơi ván mới</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full max-w-5xl animate-pop">
                    <div className="flex justify-between items-center mb-8 bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
                        <button onClick={goBack} className="px-4 py-2 bg-slate-700/50 hover:bg-slate-600 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 text-slate-300">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            Trở lại
                        </button>
                        <div className="text-slate-300 font-medium hidden md:block">Hãy tìm và nối các cặp tương ứng!</div>
                        <div className="flex gap-4 md:gap-6 items-center">
                            {/* Hiển thị Tiến độ quét câu hỏi */}
                            <div className="text-sm font-semibold text-slate-400">Tiến độ: <span className="text-emerald-400">{playedIds.length}/{questions.length}</span></div>

                            <div className="text-sm font-semibold text-slate-400">Lượt: <span className="text-white">{moves}</span></div>
                            <div className="px-4 py-1.5 bg-indigo-500/20 text-indigo-400 rounded-lg font-bold font-mono tracking-widest border border-indigo-500/30 hidden md:block">
                                {matchedIds.length} / {items.length / 2}
                            </div>
                        </div>
                    </div>

                    {/* Grid Layout optimized for Match tiles */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                        {items.map(item => {
                            const isMatched = matchedIds.includes(item.pairId);
                            const isSelected = selectedTiles.some(t => t.id === item.id);
                            const isFullSelection = selectedTiles.length === 2;

                            if (isMatched) {
                                return (
                                    <div key={item.id} className="p-4 min-h-[140px] rounded-2xl border-2 border-emerald-500/20 bg-emerald-500/5 flex items-center justify-center transition-all duration-700 scale-95 opacity-50 pointer-events-none">
                                        <svg className="w-12 h-12 text-emerald-500/40" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd"></path></svg>
                                    </div>
                                )
                            }

                            let baseClass = "p-4 min-h-[140px] rounded-2xl cursor-pointer flex items-center justify-center text-center text-sm md:text-base font-semibold transition-all duration-300 border-2 select-none active:scale-[0.97] ";

                            if (isSelected) {
                                if (isFullSelection && isWrong) {
                                    baseClass += "bg-rose-900/40 border-rose-500 text-rose-100 shadow-[0_0_20px_rgba(244,63,94,0.4)] z-10 animate-shake";
                                } else if (isFullSelection && !isWrong) {
                                    baseClass += "bg-emerald-600/40 border-emerald-500 text-emerald-50 shadow-[0_0_20px_rgba(16,185,129,0.4)] z-10 animate-pop scale-105";
                                } else {
                                    baseClass += "bg-indigo-600/30 border-indigo-400 text-white shadow-[0_0_20px_rgba(99,102,241,0.4)] scale-105 z-10";
                                }
                            } else {
                                if (item.type === 'question') {
                                    baseClass += "bg-slate-800 border-slate-600 hover:border-indigo-400/50 text-slate-200 shadow-md hover:shadow-lg";
                                } else {
                                    baseClass += "bg-slate-700/80 border-slate-500 hover:border-emerald-400/50 text-slate-100 shadow-md hover:shadow-lg";
                                }
                                if (isFullSelection) baseClass += " opacity-50 pointer-events-none";
                            }

                            return (
                                <div
                                    key={item.id}
                                    onClick={() => handleItemClick(item)}
                                    className={baseClass}
                                >
                                    {item.text}
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        }

        // Khởi chạy App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
